# Project-wide Gradle settings
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check build.gradle for more details

# For more details on build properties, see
#   http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for headless machines. See also
#   http://www.gradle.org/docs/current/userguide/gradle_daemon.html
org.gradle.jvmargs=-Xmx4096m

# When configured, Gradle will run in incubating parallel mode.
# This option should only be used with decoupled projects. See also
#   http://www.gradle.org/docs/current/userguide/multi_project_builds.html#sec:decoupled_projects
org.gradle.parallel=true

# Enable Gradle daemon for faster builds
org.gradle.daemon=true

# Enable Gradle caching
org.gradle.caching=true

# Configure on demand
org.gradle.configureondemand=true

# Android-specific properties
android.useAndroidX=true
android.enableJetifier=true
android.enableR8=true

# Build optimization
android.enableDexingArtifactTransform=true

# Suppress warnings if necessary
android.suppressUnsupportedOptionWarnings=android.useAndroidX,android.enableJetifier

# Project-specific properties
ANDROID_BUILD_VERSION=34
ANDROID_BUILD_TOOLS_VERSION=34.0.0
ANDROID_MIN_SDK_VERSION=26
ANDROID_TARGET_SDK_VERSION=34

# Kotlin
kotlin.code.style=official
