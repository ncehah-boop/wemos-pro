apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.wemos.smartwatch.pro"
        minSdkVersion 26
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
        
        // For better performance
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
        
        // MultiDex support jika diperlukan
        multiDexEnabled true
        
        // Notification channel
        manifestPlaceholders = [
            notificationChannelId: "wemos_alarm_channel",
            notificationChannelName: "Wemos Alarm"
        ]
    }

    buildFeatures {
        viewBinding false
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            debuggable true
            minifyEnabled false
        }
        
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // Signing config (opsional, untuk production)
            // signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packagingOptions {
        pickFirst 'META-INF/proguard/androidx-*.pro'
    }

    // Suppress warnings
    lintOptions {
        disable 'MissingTranslation'
        disable 'ExtraTranslation'
        disable 'GoogleAppIndexingWarning'
        abortOnError false
    }
}

// Signing configuration (update dengan keystore Anda)
/*
