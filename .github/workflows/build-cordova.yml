name: Build Android APK

on:
  push:
    branches:
      - android-apk-build
      - main
  pull_request:
    branches:
      - android-apk-build
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        java-version: ['17']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure icon and splash resources exist
        run: |
          mkdir -p res
          if [ ! -f res/icon.png ]; then
            echo "Creating placeholder icon.png"
            touch res/icon.png
          fi
          if [ ! -f res/splash.png ]; then
            echo "Creating placeholder splash.png"
            touch res/splash.png
          fi

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          target: google_apis

      - name: Install Android build tools 33.0.2 manually
        run: yes | sdkmanager "build-tools;33.0.2"

      - name: Remove incompatible Gradle and install Gradle 7.6.2
        run: |
          sudo apt-get remove -y gradle || true
          sudo rm -rf /usr/share/gradle* /usr/local/lib/gradle* || true
          wget -q https://services.gradle.org/distributions/gradle-7.6.2-bin.zip
          sudo unzip -q gradle-7.6.2-bin.zip -d /opt/gradle
          rm gradle-7.6.2-bin.zip
          echo "GRADLE_HOME=/opt/gradle/gradle-7.6.2" >> $GITHUB_ENV
          echo "/opt/gradle/gradle-7.6.2/bin" >> $GITHUB_PATH

      - name: Verify Gradle version
        run: gradle --version

      - name: Install Cordova globally
        run: npm install -g cordova@12.0.0

      - name: Install Node dependencies (ignore scripts)
        run: npm install --ignore-scripts

      - name: Add Android platform
        run: |
          cordova platform rm android --nosave || true
          cordova platform add android@12.0.0

      - name: Add cordova-plugin-splashscreen
        run: cordova plugin add cordova-plugin-splashscreen

      - name: Add cordova-plugin-statusbar
        run: cordova plugin add cordova-plugin-statusbar

      - name: Add cordova-plugin-device
        run: cordova plugin add cordova-plugin-device

      - name: Add cordova-plugin-whitelist
        run: cordova plugin add cordova-plugin-whitelist

      - name: Add cordova-plugin-local-notification
        run: cordova plugin add cordova-plugin-local-notification --variable ANDROID_SUPPORT_V4_VERSION="27.+"

      - name: Add cordova-plugin-background-mode
        run: cordova plugin add cordova-plugin-background-mode

      - name: Add cordova-plugin-network-information
        run: cordova plugin add cordova-plugin-network-information

      - name: Add cordova-plugin-wifiwizard2
        run: cordova plugin add cordova-plugin-wifiwizard2

      - name: Add cordova-plugin-media
        run: cordova plugin add cordova-plugin-media

      - name: Add cordova-plugin-file
        run: cordova plugin add cordova-plugin-file

      - name: Add cordova-plugin-file-transfer
        run: cordova plugin add cordova-plugin-file-transfer

      - name: Add cordova-sqlite-storage
        run: cordova plugin add cordova-sqlite-storage

      - name: Add cordova-plugin-secure-storage
        run: cordova plugin add cordova-plugin-secure-storage

      - name: Add cordova-plugin-vibration
        run: cordova plugin add cordova-plugin-vibration

      - name: Prepare project
        run: cordova prepare android

      - name: Copy custom Java sources and resources
        run: |
          mkdir -p platforms/android/app/src/main/java/com/wemos/notification
          cp -r app/src/main/java/com/wemos/notification/*.java platforms/android/app/src/main/java/com/wemos/notification/ 2>/dev/null || true
          cp -r app/src/main/res/values/*.xml platforms/android/app/src/main/res/values/ 2>/dev/null || true
          cp -r app/src/main/res/xml/*.xml platforms/android/app/src/main/res/xml/ 2>/dev/null || true
          cp app/src/main/AndroidManifest.xml platforms/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          cp proguard-rules.pro platforms/android/app/ 2>/dev/null || true
          echo "Custom sources copied successfully."

      - name: Fix Gradle issues (compile -> implementation, compileSdkVersion)
        run: |
          echo "=== Memperbaiki plugin local-notification ==="
          FILE="platforms/android/cordova-plugin-local-notification/pro-localnotification.gradle"
          if [ -f "$FILE" ]; then
            echo "File ditemukan. Isi sebelum perbaikan:"
            cat "$FILE"
            # Ganti semua 'compile' dengan 'implementation' (hati-hati hanya yang diawali spasi atau tab)
            sed -i 's/^\([ \t]*\)compile /\1implementation /g' "$FILE"
            echo "Isi setelah perbaikan:"
            cat "$FILE"
          else
            echo "File tidak ditemukan: $FILE"
          fi

          echo "=== Menambahkan compileSdkVersion ke app/build.gradle ==="
          APP_BUILD="platforms/android/app/build.gradle"
          if [ -f "$APP_BUILD" ]; then
            if ! grep -q "compileSdkVersion" "$APP_BUILD"; then
              echo "compileSdkVersion belum ada, menambahkannya..."
              # Tambahkan setelah baris 'apply plugin: 'com.android.application''
              sed -i "/apply plugin: 'com.android.application'/a android {\n    compileSdkVersion 34\n}" "$APP_BUILD"
              echo "Isi app/build.gradle sekarang:"
              cat "$APP_BUILD"
            else
              echo "compileSdkVersion sudah ada."
            fi
          else
            echo "File tidak ditemukan: $APP_BUILD"
          fi

      - name: Build Debug APK
        run: cordova build android --debug

      - name: Build Release APK
        run: cordova build android --release
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wemos-notification-app-debug.apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wemos-notification-app-release.apk
          path: platforms/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build Report
        if: always()
        run: |
          echo "Build completed"
          echo "APK artifacts ready for download"
          ls -la platforms/android/app/build/outputs/apk/ || true
