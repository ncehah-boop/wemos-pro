name: Build Android APK

on:
  push:
    branches:
      - android-apk-build
      - main
  pull_request:
    branches:
      - android-apk-build
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        java-version: ['17']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          target: google_apis

      - name: Install Cordova globally
        run: npm install -g cordova@12.0.0

      - name: Install Node dependencies (ignore scripts)
        run: npm install --ignore-scripts

      - name: Add Android platform (safe: remove first if exists)
        run: |
          cordova platform rm android --nosave || true
          cordova platform add android@12.0.0

      - name: Add Cordova plugins (manual)
        run: |
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-local-notification --variable ANDROID_SUPPORT_V4_VERSION="27.+"
          cordova plugin add cordova-plugin-wakelock
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-network-information
          cordova plugin add cordova-plugin-wifiwizard2
          cordova plugin add cordova-plugin-media
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-file-transfer
          cordova plugin add cordova-sqlite-storage
          cordova plugin add cordova-plugin-secure-storage
          cordova plugin add cordova-plugin-vibration

      - name: Prepare project (copy www & resources)
        run: cordova prepare android

      - name: Copy custom Java sources and resources to platform
        run: |
          mkdir -p platforms/android/app/src/main/java/com/wemos/notification
          cp -r app/src/main/java/com/wemos/notification/*.java platforms/android/app/src/main/java/com/wemos/notification/ 2>/dev/null || true
          cp -r app/src/main/res/values/*.xml platforms/android/app/src/main/res/values/ 2>/dev/null || true
          cp -r app/src/main/res/xml/*.xml platforms/android/app/src/main/res/xml/ 2>/dev/null || true
          cp app/src/main/AndroidManifest.xml platforms/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          cp proguard-rules.pro platforms/android/app/ 2>/dev/null || true
          echo "Custom sources copied successfully."

      - name: Build Debug APK
        run: cordova build android --debug

      - name: Build Release APK (if signing config available)
        run: cordova build android --release
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wemos-notification-app-debug.apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wemos-notification-app-release.apk
          path: platforms/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build Report
        if: always()
        run: |
          echo "Build completed"
          echo "APK artifacts ready for download"
          ls -la platforms/android/app/build/outputs/apk/ || true
