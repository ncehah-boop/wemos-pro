name: Build Android APK

on:
  push:
    branches:
      - android-apk-build
      - main
  pull_request:
    branches:
      - android-apk-build
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        java-version: ['17']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure valid PNG icons and splash exist
        run: |
          mkdir -p res
          PNG_BASE64="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
          if [ ! -f res/icon.png ]; then
            echo "$PNG_BASE64" | base64 -d > res/icon.png
          fi
          if [ ! -f res/splash.png ]; then
            cp res/icon.png res/splash.png
          fi

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          target: google_apis
          build-tools: '34.0.0'

      - name: Install Android build tools 33.0.2
        run: yes | sdkmanager "build-tools;33.0.2"

      - name: Remove Gradle 9.6.1 and install Gradle 7.6.2
        run: |
          sudo rm -rf /usr/share/gradle* /usr/local/lib/gradle* /opt/gradle* || true
          sudo apt-get remove -y gradle || true
          wget -q https://services.gradle.org/distributions/gradle-7.6.2-bin.zip
          sudo unzip -q gradle-7.6.2-bin.zip -d /opt/gradle
          rm gradle-7.6.2-bin.zip
          echo "GRADLE_HOME=/opt/gradle/gradle-7.6.2" >> $GITHUB_ENV
          echo "/opt/gradle/gradle-7.6.2/bin" >> $GITHUB_PATH

      - name: Verify Gradle version
        run: gradle --version

      - name: Install Cordova 13 globally
        run: npm install -g cordova@13.0.0

      - name: Install Node dependencies (ignore scripts)
        run: npm install --ignore-scripts

      - name: Add Android platform
        run: |
          cordova platform rm android --nosave || true
          cordova platform add android@12.0.0

      - name: Add plugins
        run: |
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-network-information
          cordova plugin add cordova-plugin-media
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-advanced-http
          cordova plugin add cordova-plugin-local-notification

      - name: Prepare project
        run: cordova prepare android

      - name: Fix compileSdkVersion, manifest, network security, and patch notification plugin
        run: |
          # 1. compileSdkVersion
          APP_BUILD="platforms/android/app/build.gradle"
          if [ -f "$APP_BUILD" ]; then
            if ! grep -q "compileSdkVersion" "$APP_BUILD"; then
              sed -i "/apply plugin: 'com.android.application'/a android {\n    compileSdkVersion 34\n}" "$APP_BUILD"
            fi
          fi

          # 2. AndroidManifest: cleartext + networkSecurityConfig (gunakan pemisah #)
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "usesCleartextTraffic" "$MANIFEST"; then
              sed -i 's#<application #<application android:usesCleartextTraffic="true" #' "$MANIFEST"
            fi
            if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
              sed -i 's#<application #<application android:networkSecurityConfig="@xml/network_security_config" #' "$MANIFEST"
            fi
          fi

          # 3. Buat network_security_config.xml
          RES_XML="platforms/android/app/src/main/res/xml"
          mkdir -p "$RES_XML"
          cat > "$RES_XML/network_security_config.xml" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

          # 4. gradle.properties
          GRADLE_PROPS="platforms/android/gradle.properties"
          if ! grep -q "android.suppressUnsupportedCompileSdk" "$GRADLE_PROPS"; then
            echo "android.suppressUnsupportedCompileSdk=34" >> "$GRADLE_PROPS"
          fi
          if ! grep -q "android.enableJetifier" "$GRADLE_PROPS"; then
            echo "android.enableJetifier=true" >> "$GRADLE_PROPS"
          fi

          # 5. Patch plugin local-notification: compile -> implementation (gunakan pemisah #)
          NOTIF_GRADLE="platforms/android/cordova-plugin-local-notification/pro-localnotification.gradle"
          if [ -f "$NOTIF_GRADLE" ]; then
            echo "Memperbaiki file $NOTIF_GRADLE"
            sed -i 's#compile(#implementation(#g' "$NOTIF_GRADLE"
            cat "$NOTIF_GRADLE"
          else
            echo "File $NOTIF_GRADLE tidak ditemukan, plugin local-notification mungkin tidak terpasang."
          fi

      - name: Build Debug APK
        run: cordova build android --debug

      - name: Build Release APK (optional)
        run: cordova build android --release
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wemos-notification-app-debug.apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wemos-notification-app-release.apk
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Build Report
        if: always()
        run: |
          echo "Build completed"
          ls -la platforms/android/app/build/outputs/apk/ || true
